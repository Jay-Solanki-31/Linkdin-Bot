version: "3.9"

services:
  backend:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      - mongo
      - redis
    env_file:
      - .env

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  mongo:
    image: mongo
    ports:
      - "27017:27017"

  redis:
    image: redis

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus